services:
  - type: web
    name: lapinou-api
    env: node
    plan: free
    rootDir: api
    # npm install déclenche automatiquement postinstall (api/scripts/generate-prisma-client.js)
    # qui génère le bon client Prisma selon NODE_ENV. On regénère une 2e fois ici en filet
    # de sécurité explicite, au cas où le cache de build de Render saute l'étape postinstall.
    buildCommand: npm install && npx prisma generate --schema=prisma/schema.production.prisma
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: WAVE_NUMBER_NEXURA
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FRONTEND_URL
        sync: false
